<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal — Jack & Jill EM High School</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
   <style>
    *, *::before, *::after { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
    }
    
    :root {
        --navy: #0a1628;
        --gold: #c8a84b;
        --white: #ffffff;
        --header-navy: #0d1b3e;
    }

    html, body {
        width: 100%;
        height: 100%;
        margin: 0 !important;
        padding: 0 !important;
        overflow-x: hidden;
    }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        display: flex;
        flex-direction: column;
        background: 
            linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.85)),
            url("student.jpeg") center/cover no-repeat fixed;
    }

    /* ── HEADER ── */
    header {
        background: var(--header-navy);
        position: relative;
        overflow: visible;
        text-align: center;
        padding: 40px 20px 50px;
        min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100% !important; 
        margin: 0 !important; 
        border-radius: 0 !important; 
        left: 0 !important;
        top: 0 !important;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    header::before {
        content:''; position:absolute; inset:0;
        background-image: 
            linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%), 
            linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%), 
            linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%);
        background-size: 40px 40px;
        z-index: 0;
    }

    .logo {
        position: absolute; 
        top: 50%; 
        transform: translateY(-50%);
        width: clamp(70px, 9vw, 110px); 
        height: clamp(70px, 9vw, 110px);
        border-radius: 50%; 
        border: 3px solid var(--gold); 
        background: white; 
        object-fit: contain; 
        padding: 6px;
        z-index: 10; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }
    .logo-left  { left: 3%; }
    .logo-right { right: 3%; }

    .header-content { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }
    
    .header-content h1 { 
        font-family: 'Playfair Display', serif; 
        color: var(--white); 
        font-size: clamp(20px, 4vw, 40px); 
        letter-spacing: 2px;
        margin-bottom: 14px;
        line-height: 1.2;
    }

    .tagline { 
        color: #e5e7eb; 
        font-size: clamp(9px, 1.3vw, 12px); 
        text-transform: uppercase; 
        letter-spacing: 3px; 
        font-weight: 600; 
        line-height: 1.9;
    }

    /* ── LOGIN CARD ── */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }

    .login-card {
        background: var(--white); width: 100%; max-width: 360px;
        border-radius: 16px; padding: 40px 30px;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        position: relative;
    }

    .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #f3f0e6;
        color: var(--navy);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 6px 14px;
        border-radius: 20px;
        margin-bottom: 18px;
    }

    .field { margin-bottom: 20px; }

    .field label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--navy);
        margin-bottom: 8px;
    }

    .input-wrap {
        position: relative;
    }

    .input-wrap input {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 15px;
        font-family: inherit;
        color: var(--navy);
        background: #f8fafc;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .input-wrap input::placeholder { color: #94a3b8; }

    .input-wrap input:focus {
        outline: none;
        border-color: var(--gold);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(200,168,75,0.15);
    }

    .btn-main { width: 100%; padding: 16px; background: var(--navy); color: var(--gold); border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: 0.3s; }
    .btn-main:hover { background: #152744; transform: translateY(-2px); }

    footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.4); font-size: 10px; }

    /* MOBILE ADJUSTMENT */
    @media (max-width: 768px) {
        .logo { display: none; }
        header { padding: 35px 15px; min-height: auto; }
    }
</style>
</head>
<body>

    <header>
        <img src="indian.jpeg" class="logo logo-left" alt="Indian Railways">
        <img src="new.jpeg" class="logo logo-right" alt="School Logo">
        
        <div class="header-content">
            <h1>JACK & JILL EM HIGH SCHOOL</h1>
            <div class="tagline">
                SOUTH COAST RAILWAY<br>
                WOMENS WELFARE ORGANIZATION [REGD]<br>
                VIJAYAWADA
            </div>
        </div>
    </header>

    <main>
        <div class="login-card">
            <div class="badge">🎓 Student Portal</div>
            <h2 style="font-family: 'Playfair Display', serif; font-size: 28px; color: var(--navy); margin-bottom: 8px;">Welcome Back</h2>
            <p style="font-size: 14px; color: #64748b; margin-bottom: 32px;">Enter your credentials to view your reports.</p>

            <div id="errorMsg" style="display:none; color: #ef4444; font-size:13px; margin-bottom:20px; text-align:center; padding: 10px; background: #fef2f2; border-radius: 8px;"></div>

            <div class="field">
                <label>Admission Number</label>
                <div class="input-wrap">
                    <input type="text" id="admissionNo" placeholder="e.g. 1001" inputmode="numeric">
                </div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
            </div>

            <button class="btn-main" onclick="doLogin()">Sign In</button>
        </div>
    </main>

    <footer>© 2026 Jack & Jill EM High School · South Coast Railway</footer>

    <script>
        const API = 'https://railway-school-project-1.onrender.com';

        async function doLogin() {
            const adm = document.getElementById('admissionNo').value.trim();
            const pwd = document.getElementById('password').value.trim();
            const err = document.getElementById('errorMsg');
            err.style.display = 'none';

            if (!adm || !pwd) { 
                err.innerText = 'Please fill in all fields'; 
                err.style.display = 'block'; 
                return; 
            }

            try {
                const res = await fetch(`${API}/api/auth/student-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admissionNo: parseInt(adm), password: pwd })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('studentToken', data.token);
                    localStorage.setItem('studentInfo', JSON.stringify(data.student));
                    window.location.href = 'dashboard.html';
                } else {
                    err.innerText = data.message || 'Invalid credentials';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.innerText = 'Server busy. Please try again in a moment.';
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
