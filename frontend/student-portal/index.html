<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal — Jack & Jill EM High School</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --navy: #0a1628;
            --gold: #c8a84b;
            --white: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* 🔥 REMOVED BLUE GLARE: Using pure black overlay 🔥 */
            background: 
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.85)),
                url("../student.jpg") center/cover no-repeat fixed;
        }

        /* ── THE BRANDED HEADER (Matching your image) ── */
        header {
            background: #0d1b3e; /* Deep Navy */
            position: relative;
            overflow: hidden;
            text-align: center;
            padding: 50px 20px 40px;
            width: 95%;
            max-width: 1200px;
            margin: 30px auto 0;
            border-radius: 12px;
            border: 1px solid rgba(200, 168, 75, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* Diamond Grid Pattern */
        header::before {
            content:''; position:absolute; inset:0;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%), 
                linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px 20px, 20px 0;
        }

        .logo {
            position: absolute; top: 35px; width: 110px; height: 110px;
            border-radius: 50%; border: 3px solid var(--gold); background: white; object-fit: contain; padding: 5px;
            z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .logo-left  { left: 40px; }
        .logo-right { right: 40px; }

        .header-content { position: relative; z-index: 1; }
        
        .header-content h1 { 
            font-family: 'Playfair Display', serif; 
            color: var(--white); 
            font-size: clamp(24px, 5vw, 48px); 
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .tagline { 
            color: #d1d5db; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 600; 
            line-height: 1.8;
        }

        .divider { 
            width: 60px; height: 2px; background: var(--gold); margin: 25px auto; 
        }

        /* STATISTICS BAR */
        .stats { 
            display: flex; justify-content: center; gap: clamp(20px, 6vw, 80px); 
            margin-top: 15px; 
        }
        .stat-val { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); font-weight: 700; }
        .stat-lbl { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; font-weight: 700; }

        /* ── COMPACT LOGIN BOX ── */
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 50px 20px; }

        .login-card {
            background: var(--white); width: 100%; max-width: 350px; /* Smaller width */
            border-radius: 16px; padding: 40px 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            position: relative;
        }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--gold); border-radius: 16px 16px 0 0; }

        .badge { display: inline-flex; align-items: center; gap: 6px; background: #f1f5f9; color: var(--navy); padding: 5px 12px; border-radius: 30px; font-size: 10px; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; }
        
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 10px; font-weight: 700; color: var(--navy); text-transform: uppercase; margin-bottom: 6px; }
        .input-wrap input { width: 100%; padding: 13px 15px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: #fcfdfe; outline: none; transition: 0.2s; }
        .input-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(200, 168, 75, 0.1); }

        .btn-main { width: 100%; padding: 15px; background: var(--navy); color: var(--gold); border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-main:hover { background: #1a2a4d; transform: translateY(-1px); }

        .footer-link { text-align: center; margin-top: 25px; font-size: 12px; }
        .footer-link a { color: var(--navy); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--gold); }

        footer { text-align: center; padding: 25px; color: rgba(255,255,255,0.4); font-size: 10px; margin-top: auto; }

        @media (max-width: 900px) { 
            .logo { display: none; } 
            .stats { display: none; }
            header { padding: 30px 15px; margin-top: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="indian.jpeg" class="logo logo-left" alt="Indian Railways">
        <img src="wwo.jpeg" class="logo logo-right" alt="School Logo">
        
        <div class="header-content">
            <h1>JACK & JILL EM HIGH SCHOOL</h1>
            <div class="tagline">
                SOUTH COAST RAILWAY<br>
                WOMENS WELFARE ORGANIZATION [REGD]<br>
                VIJAYAWADA
            </div>
            
            <div class="divider"></div>
            
            <div class="stats">
                <div class="stat-item"><div class="stat-val">75000+</div><div class="stat-lbl">Students</div></div>
                <div class="stat-item"><div class="stat-val">100+</div><div class="stat-lbl">Staff</div></div>
                <div class="stat-item"><div class="stat-val">50+</div><div class="stat-lbl">Years</div></div>
                <div class="stat-item"><div class="stat-val">1–10</div><div class="stat-lbl">Grades</div></div>
            </div>
        </div>
    </header>

    <main>
        <div class="login-card">
            <div class="badge">🎓 Student Portal</div>
            <h2 style="font-family: 'Playfair Display', serif; font-size: 26px; color: var(--navy); margin-bottom: 8px;">Welcome</h2>
            <p style="font-size: 13px; color: #64748b; margin-bottom: 25px;">Enter credentials to view your reports.</p>

            <div id="errorMsg" style="display:none; color:red; font-size:12px; margin-bottom:15px; text-align:center;"></div>

            <div class="field">
                <label>Admission No.</label>
                <div class="input-wrap"><input type="text" id="admissionNo" placeholder="Enter number"></div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="input-wrap"><input type="password" id="password" placeholder="••••••••"></div>
            </div>

            <button class="btn-main" onclick="doLogin()">Sign In</button>

            <div class="footer-link">
                Staff member? <a href="https://railway-school-project-1.onrender.com">Login here →</a>
            </div>
        </div>
    </main>

    <footer>© 2026 Jack & Jill EM High School · South Coast Railway</footer>

    <script>
        const API = 'https://railway-school-project-1.onrender.com';

        async function doLogin() {
            const adm = document.getElementById('admissionNo').value.trim();
            const pwd = document.getElementById('password').value.trim();
            const err = document.getElementById('errorMsg');
            err.style.display = 'none';

            if (!adm || !pwd) { err.innerText = 'Fill all fields'; err.style.display = 'block'; return; }

            try {
                const res = await fetch(`${API}/api/auth/student-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admissionNo: parseInt(adm), password: pwd })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('studentToken', data.token);
                    localStorage.setItem('studentInfo', JSON.stringify(data.student));
                    window.location.href = 'dashboard.html';
                } else {
                    err.innerText = data.message || 'Login failed';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.innerText = 'Connecting... try again';
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
