<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | JACK AND JILL SCHOOLS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                🚂 JACK AND JILL SCHOOLS Admin
            </div>
            <nav class="nav-links" id="sidebarNav">
                <!-- Nav items injected by JS -->
            </nav>
            <div class="sidebar-logout">
    <a onclick="logout()">🚪 Logout</a>
</div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2 id="viewTitle">Dashboard</h2>
                <div class="user-info">
                    <span id="userRoleBadge" style="background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;"></span>
                    <strong id="headerUserName">Admin</strong>
                </div>
            </header>

            <div id="content" class="content-area">
                <!-- Dynamic Content Injected Here -->
            </div>
        </main>
    </div>

    <!-- Modular Modal for Forms -->
    <div id="modal" class="modal">
        <div class="modal-content" id="modalBody"></div>
    </div>
   <script src="js/marks.js"></script>
   <script src="js/api.js"></script>
   <script src="js/app.js"></script>
   <script src="js/classreport.js"></script>
</body>
</html>
