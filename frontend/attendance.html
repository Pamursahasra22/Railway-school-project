<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance | JACK AND JILL SCHOOL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR (mirrors dashboard.html) ── */
        #sidebar {
            width: 220px;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a2f6e 0%, #233d91 60%, #1a2f6e 100%);
            display: flex;
            flex-direction: column;
            padding: 0 0 20px 0;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            box-shadow: 4px 0 18px rgba(35,61,145,0.18);
        }
        .sidebar-brand {
            padding: 22px 18px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            color: #fff;
        }
        .sidebar-brand .flag { font-size: 22px; }
        .sidebar-brand h2 { font-size: 14px; font-weight: 800; line-height: 1.3; margin-top: 4px; letter-spacing: 0.3px; }
        .sidebar-brand p  { font-size: 11px; opacity: 0.7; margin-top: 2px; }

        #sidebarNav { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .nav-item {
            padding: 11px 14px;
            border-radius: 8px;
            color: rgba(255,255,255,0.82);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.18s, color 0.18s;
            text-decoration: none;
            display: block;
        }
        .nav-item:hover  { background: rgba(255,255,255,0.13); color: #fff; }
        .nav-item.active { background: rgba(255,255,255,0.22); color: #fff; font-weight: 700; }

        .logout-btn {
            margin: 0 12px;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            color: #ff6b6b;
            font-weight: 700;
            font-size: 13px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(255,50,50,0.2); }

        /* ── MAIN ── */
        #main {
            margin-left: 220px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* TOPBAR */
        #topbar {
            background: #fff;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        #topbar h1 { font-size: 20px; font-weight: 700; color: #1e3a8a; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .role-badge {
            background: #f59e0b;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        #headerUserName { font-weight: 600; color: #334155; font-size: 14px; }

        /* CONTENT */
        #content { padding: 28px; flex: 1; }

        /* CARD */
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }

        /* FILTER BAR */
        .filter-bar {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 24px;
        }
        .filter-bar label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
        .filter-bar select, .filter-bar input {
            padding: 10px 12px;
            border-radius: 7px;
            border: 1px solid #cbd5e1;
            background: #fff;
            font-size: 14px;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }
        .filter-bar select:focus, .filter-bar input:focus { border-color: #233d91; }

        .btn-primary {
            padding: 11px 22px;
            background: linear-gradient(135deg, #233d91, #3b5fc0);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-success {
            padding: 11px 22px;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .btn-success:hover { opacity: 0.9; }

        /* SESSION TABS */
        .session-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }
        .session-tab {
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid #233d91;
            color: #233d91;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.18s;
            background: #fff;
        }
        .session-tab.active { background: #233d91; color: #fff; }
        .session-tab:hover:not(.active) { background: #eef2ff; }

        /* ATTENDANCE TABLE */
        #attendanceTableWrapper table {
            width: 100%;
            border-collapse: collapse;
        }
        #attendanceTableWrapper thead th {
            background: #f1f5f9;
            color: #233d91;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        #attendanceTableWrapper tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            color: #334155;
            vertical-align: middle;
        }
        #attendanceTableWrapper tbody tr:hover { background: #f8fafc; }

        /* PRESENT / ABSENT TOGGLE */
        .att-toggle {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .att-btn {
            padding: 7px 18px;
            border-radius: 20px;
            border: 2px solid;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }
        .att-btn.present {
            border-color: #16a34a;
            color: #16a34a;
            background: #fff;
        }
        .att-btn.present.selected {
            background: #16a34a;
            color: #fff;
        }
        .att-btn.absent {
            border-color: #dc2626;
            color: #dc2626;
            background: #fff;
        }
        .att-btn.absent.selected {
            background: #dc2626;
            color: #fff;
        }

        /* SUMMARY BAR */
        #summaryBar {
            display: flex;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .summary-chip {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chip-total   { background: #eff6ff; color: #1e40af; }
        .chip-present { background: #f0fdf4; color: #15803d; }
        .chip-absent  { background: #fef2f2; color: #b91c1c; }
        .chip-unmarked { background: #fefce8; color: #92400e; }

        /* SAVE SECTION */
        #saveSection {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 14px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        /* HISTORY TABLE */
        #historyWrapper table {
            width: 100%;
            border-collapse: collapse;
        }
        #historyWrapper thead th {
            background: #f1f5f9;
            color: #233d91;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        #historyWrapper tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
            color: #334155;
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }
        .badge-present { background: #dcfce7; color: #15803d; }
        .badge-absent  { background: #fee2e2; color: #b91c1c; }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #94a3b8;
        }
        .empty-state .icon { font-size: 42px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }

        /* TABS (Mark / History) */
        .page-tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 24px;
        }
        .page-tab {
            padding: 11px 26px;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: color 0.18s, border-color 0.18s;
        }
        .page-tab.active { color: #233d91; border-bottom-color: #233d91; }
        .page-tab:hover:not(.active) { color: #475569; }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            color: #fff;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 999;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.success { border-left: 4px solid #22c55e; }
        #toast.error   { border-left: 4px solid #ef4444; }

        @media (max-width: 700px) {
            #sidebar { width: 60px; }
            .sidebar-brand h2, .sidebar-brand p, .nav-item { font-size: 0; padding: 12px; }
            #main { margin-left: 60px; }
        }
    </style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<div id="sidebar">
    <div class="sidebar-brand">
        <div class="flag">🏫</div>
        <h2>JACK AND JILL SCHOOLS Admin</h2>
    </div>
    <div id="sidebarNav">
        <!-- Populated by attendance.js -->
    </div>
    <div class="logout-btn" onclick="logout()">🚪 Logout</div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="main">
    <!-- TOPBAR -->
    <div id="topbar">
        <h1>📋 Attendance Management</h1>
        <div class="topbar-right">
            <span class="role-badge" id="userRoleBadge">Teacher</span>
            <span id="headerUserName">Admin</span>
        </div>
    </div>

    <!-- CONTENT -->
    <div id="content">
        <div class="card">

            <!-- PAGE TABS -->
            <div class="page-tabs">
                <div class="page-tab active" id="tab-mark" onclick="switchTab('mark')">✏️ Mark Attendance</div>
                <div class="page-tab" id="tab-history" onclick="switchTab('history')">📊 View History</div>
            </div>

            <!-- ══ MARK ATTENDANCE TAB ══ -->
            <div id="markSection">
                <!-- FILTER BAR -->
                <div class="filter-bar">
                    <div>
                        <label>Date</label>
                        <input type="date" id="att_date">
                    </div>
                    <div>
                        <label>Class</label>
                       <select id="att_class">
    <option value="">-- Select Class --</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
</select>
                    </div>
                    <div>
                        <label>Section</label>
                       <select id="att_section">
    <option value="">-- Select Section --</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
    <option value="E">E</option>
    <option value="F">F</option>
</select>
                    </div>
                    <div>
                        <button class="btn-primary" id="loadBtn" onclick="loadStudentsForAttendance()">Load Students</button>
                    </div>
                </div>

                <!-- SESSION SELECTOR -->
                <div id="sessionRow" style="display:none; margin-bottom:18px;">
                    <p style="font-size:12px; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;">Session</p>
                    <div class="session-tabs">
                        <div class="session-tab active" id="sess-morning" onclick="selectSession('Morning')">🌅 Morning</div>
                        <div class="session-tab" id="sess-afternoon" onclick="selectSession('Afternoon')">☀️ Afternoon</div>
                    </div>
                </div>

                <!-- QUICK ACTIONS -->
                <div id="quickActions" style="display:none; margin-bottom:14px; display:none; gap:10px; flex-wrap:wrap;">
                    <button class="btn-primary" style="background: linear-gradient(135deg,#16a34a,#22c55e);" onclick="markAll('Present')">✅ Mark All Present</button>
                    <button class="btn-primary" style="background: linear-gradient(135deg,#dc2626,#ef4444);" onclick="markAll('Absent')">❌ Mark All Absent</button>
                </div>

                <!-- SUMMARY BAR -->
                <div id="summaryBar" style="display:none;"></div>

                <!-- ATTENDANCE TABLE -->
                <div id="attendanceTableWrapper"></div>

                <!-- SAVE BUTTON -->
                <div id="saveSection" style="display:none;">
                    <span id="saveNote" style="font-size:13px; color:#64748b;"></span>
                    <button class="btn-success" onclick="saveAttendance()">💾 Save Attendance</button>
                </div>
            </div>

            <!-- ══ HISTORY TAB ══ -->
            <div id="historySection" style="display:none;">
                <div class="filter-bar">
                    <div>
                        <label>Date</label>
                        <input type="date" id="hist_date">
                    </div>
                    <div>
                        <label>Class</label>
                        <select id="hist_class">
    <option value="">All Classes</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
</select>
                    </div>
                    <div>
                        <label>Section</label>
                        <select id="hist_section">
    <option value="">All Sections</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
    <option value="E">E</option>
    <option value="F">F</option>
</select>
                    </div>
                    <div>
                        <label>Session</label>
                        <select id="hist_session">
                            <option value="">All Sessions</option>
                            <option value="Morning">Morning</option>
                            <option value="Afternoon">Afternoon</option>
                        </select>
                    </div>
                    <div>
                        <button class="btn-primary" onclick="loadHistory()">🔍 Search</button>
                    </div>
                </div>
                <div id="historyWrapper"></div>
            </div>

        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/attendance.js"></script>
</body>
</html>
